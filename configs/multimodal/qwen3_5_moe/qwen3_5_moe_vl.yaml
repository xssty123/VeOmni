model:
  model_path: Qwen/Qwen3.5-35B-A3B
  ops_implementation:
    attn_implementation: flash_attention_2
    moe_implementation: fused_triton
    cross_entropy_loss_implementation: chunk_loss
    rms_norm_implementation: npu
    rotary_pos_emb_implementation: npu
    swiglu_mlp_implementation: eager           # no NPU backend
    load_balancing_loss_implementation: eager  # triton-ascend not exposed as `triton`
    # Qwen3.5 GatedDeltaNet trio — only meaningful for Qwen3.5 MoE; pin to
    # eager on NPU (no NPU kernel) and set train.dyn_bsz=False (eager path
    # only supports non-varlen training):
    rms_norm_gated_implementation: eager
    moe_implementation: fused
    causal_conv1d_implementation: eager
    chunk_gated_delta_rule_implementation: eager
    
data:
  train_path: configs/multimodal/data/tulu_sharegpt4v_llavavideo.yaml
  data_type: conversation
  chat_template: qwen3vl
  max_seq_len: 4096
  train_size: 80000000
  mm_configs:
    image_max_pixels: 602112 # 28 * 28 * 768
    video_max_pixels: 602112 # 28 * 28 * 768
    video_total_pixels: 2889523 # max_seq_len * 28^2 * 0.9, dynamic per-frame budget
    max_frames: 16
    fps: 2.0
    use_audio_in_video: false

train:
  accelerator:
    ulysses_size: 8
    fsdp_config:
      fsdp_mode: fsdp2
  gradient_checkpointing:
    enable_reentrant: false
  wandb:
    enable: false
    project: VeOmni
    name: Qwen3.5-35B-A3B-vl-sft
  freeze_vit: false
  optimizer:
    lr: 1.0e-5
    lr_decay_style: cosine
  num_train_epochs: 2
  micro_batch_size: 1
  global_batch_size: 16
  max_steps: 500
  init_device: meta
  profile:
    enable: true
    start_step: 20
    end_step: 21
    record_shapes: true
  checkpoint:
    output_dir: Qwen3.5-35B-A3B-vl-sft
    manager: dcp
    save_hf_weights: false
